## Render Blueprint — https://render.com/docs/blueprint-spec
## Declares: backend Web Service + frontend Static Site + Postgres database

databases:
  - name: pocketdiscount-db
    databaseName: pocketdiscount
    user: pocketdiscount
    plan: free

services:
  # ── NestJS API ──────────────────────────────────────────────────────────────
  - type: web
    name: pocketdiscount-api
    runtime: node
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pocketdiscount-db
          property: connectionString
      - key: PUBLIC_URL
        fromService:
          name: pocketdiscount-api
          type: web
          property: host
      - key: PORT
        value: 10000

  # ── Expo Web (Static Site) ───────────────────────────────────────────────────
  - type: web
    name: pocketdiscount-web
    runtime: static
    plan: free
    rootDir: apps/frontend
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: EXPO_PUBLIC_API_URL
        fromService:
          name: pocketdiscount-api
          type: web
          property: host
        # append /api — Render doesn't support string concatenation in blueprints,
        # so set EXPO_PUBLIC_API_URL manually in the Render dashboard after first deploy:
        #   https://<pocketdiscount-api-url>/api
