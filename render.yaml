## Render Blueprint — https://render.com/docs/blueprint-spec
## Declares: backend Web Service + frontend Static Site + Postgres database
##
## Notes on plans (as of 2025):
##   - Web Services: free tier removed; "starter" ($7/mo) is the lowest paid tier.
##     Omit `plan` to use the dashboard default, or set `starter` explicitly.
##   - Static Sites: still free (no plan required).
##   - PostgreSQL: free tier still available on the `free` plan (90-day expiry).

databases:
  - name: pocketdiscount-db
    databaseName: pocketdiscount
    user: pocketdiscount
    # Free-tier Postgres (expires after 90 days; upgrade to paid when ready)
    plan: free

services:
  # ── NestJS API ──────────────────────────────────────────────────────────────
  - type: web
    name: pocketdiscount-api
    runtime: node
    # plan: starter   ← uncomment and set a plan if Render requires it
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pocketdiscount-db
          property: connectionString
      - key: PUBLIC_URL
        fromService:
          name: pocketdiscount-api
          type: web
          property: host
      - key: PORT
        value: 10000

  # ── Expo Web (Static Site — free) ───────────────────────────────────────────
  - type: web
    name: pocketdiscount-web
    runtime: static
    # Static sites are free on Render; no plan needed
    rootDir: apps/frontend
    buildCommand: npm install --legacy-peer-deps && npx expo export --platform web
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: EXPO_PUBLIC_API_URL
        fromService:
          name: pocketdiscount-api
          type: web
          property: host
        # NOTE: After first deploy, manually set EXPO_PUBLIC_API_URL in the
        # Render dashboard to: https://<pocketdiscount-api>.onrender.com/api
        # (Render blueprints don't support string concatenation for env vars)
