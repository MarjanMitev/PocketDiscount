name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Render deploys
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend (pocketdiscount-api)
        run: |
          curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" \
            -X POST \
            --retry 3 \
            --retry-delay 5 \
            -o /dev/null \
            -w "Backend deploy triggered: HTTP %{http_code}\n"

      - name: Deploy frontend (pocketdiscount-web)
        run: |
          curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" \
            -X POST \
            --retry 3 \
            --retry-delay 5 \
            -o /dev/null \
            -w "Frontend deploy triggered: HTTP %{http_code}\n"

      - name: Summary
        run: |
          echo "### Deploy triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Both Render services have been queued for deployment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Track progress at https://dashboard.render.com" >> $GITHUB_STEP_SUMMARY
