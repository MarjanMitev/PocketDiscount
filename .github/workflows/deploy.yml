name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy backend (pocketdiscount-api)
        working-directory: apps/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID_BACKEND }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set – skipping deploy. Add it as a GitHub secret to enable auto-deploy."
            exit 0
          fi
          railway up --service "$RAILWAY_SERVICE_ID" --detach
          echo "Backend deploy triggered on Railway."

      - name: Deploy frontend (pocketdiscount-web)
        working-directory: apps/frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID_FRONTEND }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set – skipping deploy."
            exit 0
          fi
          railway up --service "$RAILWAY_SERVICE_ID" --detach
          echo "Frontend deploy triggered on Railway."

      - name: Summary
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "### Railway deploy skipped — secrets not configured" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Add the following GitHub secrets to enable auto-deploy after every merge:" >> $GITHUB_STEP_SUMMARY
            echo "- \`RAILWAY_TOKEN\` — from Railway dashboard → Account Settings → Tokens" >> $GITHUB_STEP_SUMMARY
            echo "- \`RAILWAY_SERVICE_ID_BACKEND\` — service ID of pocketdiscount-api" >> $GITHUB_STEP_SUMMARY
            echo "- \`RAILWAY_SERVICE_ID_FRONTEND\` — service ID of pocketdiscount-web" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See \`docs/RAILWAY_DEPLOYMENT.md\` for full setup instructions." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Deployed to Railway ✓" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Both services are deploying. Track at https://railway.app/dashboard" >> $GITHUB_STEP_SUMMARY
          fi
