name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Render deploys
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend (pocketdiscount-api)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "⚠ RENDER_DEPLOY_HOOK_BACKEND not set – skipping backend deploy."
            exit 0
          fi
          curl -fsSL "$HOOK" \
            -X POST \
            --retry 3 \
            --retry-delay 5 \
            -o /dev/null \
            -w "Backend deploy triggered: HTTP %{http_code}\n"

      - name: Deploy frontend (pocketdiscount-web)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "⚠ RENDER_DEPLOY_HOOK_FRONTEND not set – skipping frontend deploy."
            exit 0
          fi
          curl -fsSL "$HOOK" \
            -X POST \
            --retry 3 \
            --retry-delay 5 \
            -o /dev/null \
            -w "Frontend deploy triggered: HTTP %{http_code}\n"

      - name: Summary
        env:
          HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$HOOK_BACKEND" ] || [ -z "$HOOK_FRONTEND" ]; then
            echo "### Deploy hooks not yet configured" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Add **RENDER_DEPLOY_HOOK_BACKEND** and **RENDER_DEPLOY_HOOK_FRONTEND** as GitHub secrets to enable auto-deploy." >> $GITHUB_STEP_SUMMARY
            echo "See \`docs/RENDER_DEPLOYMENT.md\` for instructions." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Deploy triggered ✓" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Both Render services queued for deployment." >> $GITHUB_STEP_SUMMARY
            echo "Track progress at https://dashboard.render.com" >> $GITHUB_STEP_SUMMARY
          fi
